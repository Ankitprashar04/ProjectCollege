{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Manage Products

</title>

<link rel="stylesheet"
href="{% static 'css/manage_products.css' %}">

</head>

<body>

<div class="container">

<h1>

Manage Products

</h1>


<div class="table-box">

<table>

<thead>

<tr>

<th>

Image

</th>

<th>

Name

</th>

<th>

Price

</th>

<th>

Category

</th>

<th>

Action

</th>

</tr>

</thead>


<tbody>

{% for product in products %}

<tr>

<td>

<img
src="{{ product.image.url }}"
class="product-image">

</td>

<td>

{{ product.name }}

</td>

<td>

₹{{ product.price }}

</td>

<td>

{{ product.category }}

</td>

<td>

<a href="{% url 'edit_product' product.id %}"
class="edit-btn">

Edit

</a>


<a href="{% url 'delete_product' product.id %}"
class="delete-btn">

Delete

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5">

No Products Found

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
