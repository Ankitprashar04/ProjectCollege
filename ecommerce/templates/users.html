{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Users Management

</title>

<link rel="stylesheet"
href="{% static 'css/users.css' %}">

</head>

<body>

<div class="container">

<h1>

Users Management

</h1>


<div class="table-box">

<table>

<thead>

<tr>

<th>

Username

</th>

<th>

Email

</th>

<th>

Role

</th>

<th>

Status

</th>

<th>

Action

</th>

</tr>

</thead>


<tbody>

{% for user in users %}

<tr>

<td>

{{ user.user.username }}

</td>

<td>

{{ user.user.email }}

</td>

<td>

{{ user.role }}

</td>

<td>

{% if user.approved %}

<span class="approved">

Approved

</span>

{% else %}

<span class="pending">

Pending

</span>

{% endif %}

</td>

<td>

<a
href="{% url 'delete_user' user.id %}"
class="delete-btn">

Delete

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5">

No Users Found

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
