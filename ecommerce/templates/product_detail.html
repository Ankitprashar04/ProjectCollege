{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

{{ product.name }}

</title>

<link rel="stylesheet"
href="{% static 'css/product_detail.css' %}">

<link rel="stylesheet"
href="{% static 'css/navbar.css' %}">

</head>

<body>

{% include 'navbar.html' %}


<section class="product-container">

    <!-- Product Image -->

    <div class="product-image">

        <img
        src="{{ product.image.url }}"
        alt="{{ product.name }}">

    </div>



    <!-- Product Details -->

    <div class="product-info">

        <span class="category">

            {{ product.category }}

        </span>


        <h1>

            {{ product.name }}

        </h1>


        <h2>

            ₹{{ product.price }}

        </h2>


        <p class="description">

            {{ product.description }}

        </p>


        <div class="features">

            <div>

                Fast Delivery

            </div>

            <div>

                Secure Payment

            </div>

            <div>

                Best Quality

            </div>

        </div>


        <div class="buttons">

            <a href="{% url 'add_to_cart' product.id %}"
               class="cart-btn">

                Add To Cart

            </a>


            <a href="{% url 'checkout' %}"
               class="buy-btn">

                Buy Now

            </a>

        </div>

    </div>

</section>

</body>

</html>
