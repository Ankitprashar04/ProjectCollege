{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Create Account</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="email"
            name="email"
            placeholder="Email"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <input type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            required>

            <button type="submit">

                Register

            </button>

        </form>

        <p>
            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
